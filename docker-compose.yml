version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: million-pixel-backend
    
    ports:
      - "5000:5000"
    
    environment:
      # ===== SERVER CONFIG =====
      - NODE_ENV=development
      - PORT=5000
      
      # ===== LOCAL DOCKER MYSQL CONFIG =====
      # These connect to container_uminionmysql (page009's MySQL container)
      # Instead of remote VPS MySQL, we use the local Docker MySQL
      - DB_HOST=container_uminionmysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      
      # ===== JWT CONFIG =====
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      
      # ===== STRIPE CONFIG =====
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      
      # ===== WOOCOMMERCE CONFIG =====
      # Secret from page001's WooCommerce webhook settings
      - WOOCOMMERCE_WEBHOOK_SECRET=${WOOCOMMERCE_WEBHOOK_SECRET}
      
      # ===== URL CONFIG =====
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
    
    restart: unless-stopped
    
    networks:
      - pixel-network
      - uminionnet  # ← ADD THIS to connect to page009's MySQL

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    
    container_name: million-pixel-frontend
    
    ports:
      - "5001:80"
    
    depends_on:
      - backend
    
    restart: unless-stopped
    
    networks:
      - pixel-network

networks:
  pixel-network:
    driver: bridge
  
  uminionnet:  # ← ADD THIS
    external: true  # ← This means it already exists (created by page009)
